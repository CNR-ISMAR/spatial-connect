name: Release plugin ZIP

on:
  push:
    tags:
      - "v*"          # triggers on git tag v0.1.0, v1.2.3, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: python build_plugin_zip.py

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SpatialConnect v${{ steps.version.outputs.version }}"
          files: dist/SpatialConnect-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
